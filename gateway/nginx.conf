worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # =============================================
    #  Hospital Integration System - API Gateway
    #  Nginx Reverse Proxy Configuration
    # =============================================

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Upstream definitions
    upstream registrasi {
        server registrasi-service:8001;
    }
    upstream emr {
        server emr-service:8002;
    }
    upstream farmasi {
        server farmasi-service:8003;
    }
    upstream billing {
        server billing-service:8004;
    }
    upstream integration {
        server integration-service:8005;
    }

    server {
        listen 80;
        server_name localhost;

        # --- Increase body size for large payloads ---
        client_max_body_size 10M;

        # --- CORS headers (global) ---
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ============================================
        #  Application Service Routes
        # ============================================

        # --- Registrasi Pasien ---
        location /registrasi/ {
            proxy_pass http://registrasi/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Rekam Medis (EMR) ---
        location /emr/ {
            proxy_pass http://emr/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Farmasi (SOAP/XML) ---
        location /farmasi/ {
            proxy_pass http://farmasi/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Billing & Asuransi ---
        location /billing/ {
            proxy_pass http://billing/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Integration Service ---
        location /integration/ {
            proxy_pass http://integration/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Microservice API Routings for Frontends ---
        location /api/patients {
            proxy_pass http://registrasi/api/patients;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/records {
            proxy_pass http://emr/api/records;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/medicines {
            proxy_pass http://farmasi/api/medicines;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/dispensations {
            proxy_pass http://farmasi/api/dispensations;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/accounts {
            proxy_pass http://billing/api/accounts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api/entries {
            proxy_pass http://billing/api/entries;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ============================================
        #  Default landing page
        # ============================================
        location / {
            proxy_pass http://integration/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ============================================
        #  Health check
        # ============================================
        location /nginx-health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
